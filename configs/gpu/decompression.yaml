decompression:
  codec: "mp4v"
  mask_source: "roi_detection"

  roi_temporal_stabilize: true
  roi_temporal_alpha_still: 0.70
  roi_temporal_alpha_motion: 0.92
  roi_blend_edge_px: 2
  roi_mask_erode_px: 12
  roi_diff_mask_threshold: 14
  roi_diff_mask_dilate_px: 3
  roi_temporal_mask_dilate: 1
  roi_temporal_overlap_only: true

  codec_runtime:
    ffmpeg_bin: "ffmpeg"

  interpolate:
    enable: true
    model: "amt-s"
    weights_path: "models/amt-s.pth"
    # Local AMT repository path.
    repo_dir: "_third_party_amt"
    device: "auto"
    fp16: true
    pad_to: 16
    batch_size: 8
    crop_margin: 8
    max_crop_side: 768
    max_crop_ratio: 0.35
