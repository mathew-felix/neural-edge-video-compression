roi_detection:
  enable: true
  paths:
    animal_model_path: "models/MDV6-yolov9-c.pt"
    animal_model_path_onnx: "models/MDV6-yolov9-c.onnx"
  runtime:
    device: "cpu"
    # Keep detector backend explicit for reproducible experiments.
    prefer_onnx: false
    prefer_onnx_strict: false
    half: true
    processing_scale: 0.50
    imgsz: 640
    conf: 0.25
    iou_nms: 0.50
    target_class_ids: [0]
    start_frame: 0
    end_frame: -1
    keyframe_interval: 15
    model_merge_iou: 0.30
    bbox_pad_frac: 0.10
    bbox_pad_px: 8
  tracking:
    enable_propagation: true
    match_iou: 0.30
    min_hits: 2
    max_det_gap: 90
    vel_smooth: 0.70
    klt_max_points: 80
    klt_min_points: 10

frame_removal:
  params:
    roi:
      halo_frac: 0.20
      fixed_size: 160
      blur_ksize: 5
      gray: true
    bbox_smoothing:
      enable: true
      ema_alpha: 0.60
    motion:
      state_source: "hybrid"
      t_low: 0.90
      t_high: 1.90
      bbox_t_low_px: 0.50
      bbox_t_high_px: 1.00
      enter_motion_frames: 2
      enter_still_frames: 4
  dual_timeline:
    enable: true
    roi_motion_interval: 2
    roi_still_interval: 3
    bg_interval: 6
    bg_idle_interval: 10

compression:
  low_memory: true
  codec:
    # AV1-only pipeline:
    # ROI stream -> AV1 in roi.ivf
    # BG stream  -> AV1 in bg.ivf
    #
    # Other codecs are intentionally unsupported in this configuration.
    backend: "av1"
    # ffmpeg executable used for encoding the ROI and BG streams.
    ffmpeg_bin: "ffmpeg"
    # AV1 encoder choice:
    #   auto       -> prefer libsvtav1, fall back to libaom-av1
    #   libsvtav1  -> use SVT-AV1 explicitly
    #   libaom-av1 -> use libaom explicitly
    #
    # Jetson note:
    #   many Jetson ffmpeg builds have libaom-av1 but not libsvtav1.
    av1_encoder: "auto"
    # AV1 preset for libsvtav1.
    # Common range: "0" to "13"
    # lower = slower / better quality
    # higher = faster / lower quality
    preset: "8"
    # libaom-av1 tuning knobs used when av1_encoder resolves to libaom-av1.
    # cpu_used:
    #   higher = faster / worse quality efficiency
    # row_mt:
    #   "1" enables row-based threading
    # tiles:
    #   tile layout, for example "2x1"
    cpu_used: "8"
    row_mt: "1"
    tiles: "2x1"
    # GOP / keyframe interval for both streams.
    gop: 32
    # Pixel format used for encoded streams.
    pix_fmt: "yuv420p"
  roi:
    min_conf: 0.0
    dilate_px: 0
    # Extra padding, in pixels, added around each ROI detection before
    # cropping/encoding the ROI region. Increase this if placement looks tight
    # or ROI patch edges are too close to the subject.
    crop_margin_px: 40
    # Margin used when removing ROI from background keep frames. Keep this
    # aligned with crop_margin_px for the default background-model path that
    # tested best overall in this repo.
    bg_remove_margin_px: 40
    # Fallback inpaint radius if temporal/model BG fill cannot supply a patch.
    bg_inpaint_radius: 5
    # Nearby-frame search used only as a fallback when the background model
    # alone is not enough.
    bg_fill_search_radius: 60
    bg_fill_max_iou: 0.05
    bg_fill_min_donors: 4
    bg_fill_max_donors: 8
    # Number of BG keep frames sampled to build the static background model.
    bg_model_max_samples: 24
    # Feather width for blending the background-model patch back into the
    # original frame.
    bg_fill_feather_px: 10
  quality:
    # Independent QP values for the two transmitted streams.
    # Lower QP = higher quality / larger size.
    # Higher QP = lower quality / smaller size.
    roi_qp: 18
    bg_qp: 35

output:
  write_outputs: true
  # Empty string keeps archive next to input video.
  out_dir: "outputs/compression"
