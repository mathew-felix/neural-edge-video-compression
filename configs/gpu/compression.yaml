roi_detection:
  enable: true
  paths:
    animal_model_path: "models/MDV6-yolov9-c.pt"
    animal_model_path_onnx: "models/MDV6-yolov9-c.onnx"
  runtime:
    device: "cuda:0"
    # Keep detector backend explicit for reproducible experiments.
    prefer_onnx: false
    prefer_onnx_strict: false
    half: true
    processing_scale: 0.50
    imgsz: 640
    conf: 0.25
    iou_nms: 0.50
    target_class_ids: [0]
    start_frame: 0
    end_frame: -1
    keyframe_interval: 15
    model_merge_iou: 0.30
    bbox_pad_frac: 0.10
    bbox_pad_px: 8
  tracking:
    enable_propagation: true
    match_iou: 0.30
    min_hits: 2
    max_det_gap: 90
    vel_smooth: 0.70
    klt_max_points: 80
    klt_min_points: 10

frame_removal:
  params:
    roi:
      halo_frac: 0.20
      fixed_size: 160
      blur_ksize: 5
      gray: true
    bbox_smoothing:
      enable: true
      ema_alpha: 0.60
    motion:
      state_source: "hybrid"
      t_low: 0.90
      t_high: 1.90
      bbox_t_low_px: 0.50
      bbox_t_high_px: 1.00
      enter_motion_frames: 2
      enter_still_frames: 4
  dual_timeline:
    enable: true
    roi_motion_interval: 2
    roi_still_interval: 3
    bg_interval: 6
    bg_idle_interval: 10

compression:
  # Low-memory mode streams ROI/BG frames into the DCVC encoder instead of
  # caching all kept full-resolution frames in RAM (reduces peak CPU RAM).
  low_memory: true
  dcvc:
    # Official DCVC-RT backend with deterministic upstream defaults.
    backend: "dcvc_rt_int16"
    repo_dir: "DCVC"
    model_i: "models/cvpr2025_image.pth.tar"
    model_p: "models/cvpr2025_video.pth.tar"
    device: "cuda"
    use_cuda: true
    cuda_idx: 0
    reset_interval: 32
    intra_period: -1
    force_zero_thres: 0.12
  roi:
    min_conf: 0.0
    dilate_px: 0
  quality:
    roi_qp_i: 63
    roi_qp_p: 63
    bg_qp_i: 25
    bg_qp_p: 25

output:
  write_outputs: true
  # Empty string keeps archive next to input video.
  out_dir: "outputs/compression"
